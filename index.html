<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz do Davi 💙</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#0a5cff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.caixa{
background:white;
width:90%;
max-width:420px;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

h1{
color:#1565ff;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:25px;
color:#444;
line-height:28px;
}

button{
background:#1565ff;
color:white;
border:none;
padding:15px 35px;
font-size:18px;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#0048d9;
}

</style>

</head>

<body>

<div class="caixa">

<h1>💙 Será que você me conhece? 💙</h1>

<p>
Preparei esse quiz porque queria que a gente se conhecesse um pouquinho melhor. 😊
</p>

<button>
Começar 🚀
</button>

</div>

</body>
</html>
